<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Bookshelf</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f8f5f0; color: #333; }

    header { background: #2c2c2c; color: white; padding: 24px 20px; text-align: center; }
    header h1 { font-size: 1.6rem; font-weight: 600; }
    header p { font-size: 0.85rem; opacity: 0.6; margin-top: 4px; }

    .filters { display: flex; justify-content: center; gap: 8px; padding: 20px; flex-wrap: wrap; }
    .filter-btn {
      padding: 8px 20px; border: 2px solid #2c2c2c; background: transparent;
      border-radius: 20px; cursor: pointer; font-size: 0.9rem; transition: all 0.2s;
    }
    .filter-btn.active { background: #2c2c2c; color: white; }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 20px; padding: 0 20px 40px;
      max-width: 1000px; margin: 0 auto;
    }

    .book-card { cursor: pointer; text-decoration: none; color: inherit; }
    .book-cover {
      width: 100%; aspect-ratio: 2/3; border-radius: 4px; overflow: hidden;
      box-shadow: 2px 4px 12px rgba(0,0,0,0.15);
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .book-card:hover .book-cover { transform: translateY(-4px); box-shadow: 4px 8px 20px rgba(0,0,0,0.2); }
    .book-cover img { width: 100%; height: 100%; object-fit: cover; }
    .book-cover .placeholder {
      width: 100%; height: 100%; display: flex; align-items: center;
      justify-content: center; padding: 12px; text-align: center;
      font-size: 0.8rem; font-weight: 600; color: white; line-height: 1.4;
    }

    .book-info { margin-top: 8px; }
    .book-title { font-size: 0.85rem; font-weight: 600; line-height: 1.3; }
    .book-author { font-size: 0.75rem; color: #888; margin-top: 2px; }
    .book-badge {
      display: inline-block; font-size: 0.65rem;
      padding: 2px 6px; border-radius: 10px; margin-top: 4px;
    }
    .badge-work    { background: #e8f0fe; color: #1a73e8; }
    .badge-private { background: #fce8e6; color: #d93025; }

    .empty { text-align: center; padding: 60px 20px; color: #aaa; grid-column: 1/-1; }

    @media (max-width: 480px) {
      .grid { grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 14px; padding: 0 14px 30px; }
    }
  </style>
</head>
<body>
  <header>
    <h1>📚 My Bookshelf</h1>
    <p>読んだ本の記録</p>
  </header>

  <div class="filters">
    <button class="filter-btn active" data-filter="all">すべて</button>
    <button class="filter-btn" data-filter="work">仕事</button>
    <button class="filter-btn" data-filter="private">趣味</button>
  </div>

  <div class="grid" id="grid"></div>

  <script>
    const COLORS = ['#5c6bc0','#26a69a','#ef5350','#ab47bc','#ff7043','#42a5f5','#66bb6a','#ffa726'];
    function colorFor(str) {
      let h = 0;
      for (const c of str) h = (h * 31 + c.charCodeAt(0)) & 0xffffffff;
      return COLORS[Math.abs(h) % COLORS.length];
    }

    let allBooks = [];
    let currentFilter = 'all';

    function render() {
      const grid = document.getElementById('grid');
      const books = allBooks.filter(b => currentFilter === 'all' || b.section === currentFilter);

      if (books.length === 0) {
        grid.innerHTML = '<div class="empty">まだ本が登録されていません</div>';
        return;
      }

      grid.innerHTML = books.map(b => `
        <a class="book-card" href="${b.url}" target="_blank" rel="noopener">
          <div class="book-cover">
            ${b.cover
              ? `<img src="${b.cover}" alt="${b.title}" loading="lazy"
                   onerror="this.parentElement.innerHTML='<div class=\\"placeholder\\" style=\\"background:${colorFor(b.title)}\\">${b.title}</div>'">`
              : `<div class="placeholder" style="background:${colorFor(b.title)}">${b.title}</div>`
            }
          </div>
          <div class="book-info">
            <div class="book-title">${b.title}</div>
            ${b.author ? `<div class="book-author">${b.author}</div>` : ''}
            <span class="book-badge ${b.section === 'work' ? 'badge-work' : 'badge-private'}">
              ${b.section === 'work' ? '仕事' : '趣味'}
            </span>
          </div>
        </a>
      `).join('');
    }

    document.querySelectorAll('.filter-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentFilter = btn.dataset.filter;
        render();
      });
    });

    fetch('books.json')
      .then(r => r.json())
      .then(data => { allBooks = Array.isArray(data) ? data : []; render(); })
      .catch(() => { allBooks = []; render(); });
  </script>
</body>
</html>
